<script>

const canvas = document.getElementById("particleCanvas");
const ctx = canvas.getContext("2d");

let particles = [];
let mouse = {
    x:null,
    y:null,
    radius:120
};

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    createTextParticles();
}

window.addEventListener("resize",resize);

function createTextParticles(){

    particles=[];

    const offCanvas=document.createElement("canvas");
    const offCtx=offCanvas.getContext("2d");

    offCanvas.width=canvas.width;
    offCanvas.height=canvas.height;

    offCtx.fillStyle="#111";
    offCtx.textAlign="center";
    offCtx.font="bold 220px Space Grotesk";

    offCtx.fillText(
        "SJ*5",
        canvas.width/2,
        canvas.height/2
    );

    const data=offCtx.getImageData(
        0,
        0,
        canvas.width,
        canvas.height
    );

    for(let y=0;y<data.height;y+=6){

        for(let x=0;x<data.width;x+=6){

            const index=
            (y*data.width+x)*4;

            if(data.data[index+3]>150){

                particles.push({
                    x:Math.random()*canvas.width,
                    y:Math.random()*canvas.height,

                    baseX:x,
                    baseY:y,

                    vx:0,
                    vy:0,

                    size:2
                });

            }

        }

    }

}

canvas.addEventListener("mousemove",(e)=>{
    mouse.x=e.x;
    mouse.y=e.y;
});

canvas.addEventListener("mouseleave",()=>{
    mouse.x=null;
    mouse.y=null;
});

function animate(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    particles.forEach(p=>{

        let dx=mouse.x-p.x;
        let dy=mouse.y-p.y;

        let distance=
        Math.sqrt(dx*dx+dy*dy);

        if(distance<mouse.radius){

            let force=
            (mouse.radius-distance)/
            mouse.radius;

            let angle=
            Math.atan2(dy,dx);

            p.vx-=Math.cos(angle)*force*8;
            p.vy-=Math.sin(angle)*force*8;
        }

        p.vx+=(p.baseX-p.x)*0.02;
        p.vy+=(p.baseY-p.y)*0.02;

        p.vx*=0.92;
        p.vy*=0.92;

        p.x+=p.vx;
        p.y+=p.vy;

        ctx.fillStyle="#111";

        ctx.beginPath();
        ctx.arc(
            p.x,
            p.y,
            p.size,
            0,
            Math.PI*2
        );
        ctx.fill();

    });

    requestAnimationFrame(animate);
}

resize();
animate();

</script>
